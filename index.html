<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main style="font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial; max-width:780px;margin:28px auto;padding:0 16px;">
        <h1>datastuffs.json — Preview</h1>
        <p id="status">Loading data…</p>
        <button id="reload">Reload</button>
        <section id="data"></section>
    </main>

    <script>
    async function loadData() {
        const status = document.getElementById('status');
        const container = document.getElementById('data');
        status.textContent = 'Fetching datastuffs.json...';
        container.innerHTML = '';
        try {
            const res = await fetch('datastuffs.json', {cache: 'no-store'});
            if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
            const data = await res.json();
            status.textContent = 'Loaded successfully.';
            // Render a readable key/value view
            const dl = document.createElement('dl');
            dl.style.display = 'grid';
            dl.style.gridTemplateColumns = '160px 1fr';
            dl.style.columnGap = '12px';
            dl.style.rowGap = '6px';
            Object.entries(data).forEach(([k,v]) => {
                const dt = document.createElement('dt');
                dt.textContent = k;
                dt.style.fontWeight = '600';
                const dd = document.createElement('dd');
                if (Array.isArray(v)) {
                    dd.textContent = v.join(', ');
                } else if (typeof v === 'object' && v !== null) {
                    dd.textContent = JSON.stringify(v);
                } else {
                    dd.textContent = String(v);
                }
                dl.appendChild(dt);
                dl.appendChild(dd);
            });
            container.appendChild(dl);

            // Also show pretty JSON for inspection
            const pre = document.createElement('pre');
            pre.style.background = '#f6f8fa';
            pre.style.padding = '12px';
            pre.style.borderRadius = '6px';
            pre.style.overflow = 'auto';
            pre.textContent = JSON.stringify(data, null, 2);
            container.appendChild(document.createElement('hr'));
            container.appendChild(pre);
        } catch (err) {
            status.textContent = 'Error loading data: ' + err.message;
            const errP = document.createElement('p');
            errP.style.color = 'crimson';
            errP.textContent = err.stack || err.message;
            container.appendChild(errP);
        }
    }

    document.getElementById('reload').addEventListener('click', loadData);
    loadData();
    </script>
</body>
</html>
